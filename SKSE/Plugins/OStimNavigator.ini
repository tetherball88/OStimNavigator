; OStim Navigator — configuration
; Restart the game after changing this file.

[Hotkeys]
; DirectInput key code for toggling the Navigator UI.
; The hotkey only fires while the player is in an active OStim scene.
; Set to 0 to disable.
;
; Common DInput key codes:
;   N  = 0x31    B  = 0x30    H  = 0x23    Tab = 0x0F
;   F5 = 0x3F    F6 = 0x40    F7 = 0x41    F8  = 0x42
;   Numpad 0 = 0x52   Numpad Enter = 0x9C   Numpad * = 0x37
;
; Default: 0x50 (Num 2)
ToggleNavigator=0x50

[Debug]
; Minimum severity of messages written to OstimNavigator.log.
; Accepted values (case-insensitive): trace, debug, info, warn, error
;
;   info  — startup/shutdown events and user-facing operations only (recommended for normal use)
;   debug — adds per-interaction detail (scene changes, UI events, API calls, etc.)
;   trace — most verbose; includes low-level internal state
;   warn  — warnings and errors only (quietest)
;
; Default: info
LogLevel=info
